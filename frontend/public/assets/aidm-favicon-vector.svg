<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="aidm-grad" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" style="stop-color:#FF33FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5E54FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background is transparent by default -->
  <text 
    x="50%" 
    y="50%" 
    dominant-baseline="central" 
    text-anchor="middle" 
    font-family="'Pretendard', 'Inter', 'Noto Sans KR', sans-serif" 
    font-size="140" 
    font-weight="900" 
    fill="url(#aidm-grad)"
    style="letter-spacing: -2px;"
  >
    AIDM
  </text>
</svg>
